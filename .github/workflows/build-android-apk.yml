name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "AppMovil_RutaDelCafe/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

concurrency:
  group: build-android-apk
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AppMovil_RutaDelCafe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AppMovil_RutaDelCafe/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Configure API (nube)
        run: echo "EXPO_PUBLIC_API_URL=https://ps3-ruta-cafe-1.onrender.com" > .env.local

      - name: Build release APK
        run: |
          cd android
          bash ./gradlew assembleRelease --no-daemon -x lint

      - name: Copy APK to releases/
        run: |
          mkdir -p ../releases
          cp android/app/build/outputs/apk/release/app-release.apk \
            ../releases/RutaDelCafe-1.0.0.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RutaDelCafe-apk
          path: releases/RutaDelCafe-1.0.0.apk

      - name: Commit APK to repository
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/RutaDelCafe-1.0.0.apk
          git diff --staged --quiet || git commit -m "build: APK Android RutaDelCafe 1.0.0 (API nube)"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
