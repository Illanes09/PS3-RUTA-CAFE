services:
  - type: web
    name: rutacafe-api
    runtime: node
    rootDir: BackendRutaCafe
    plan: free
    buildCommand: npm install
    startCommand: node scripts/bootstrap-db.js && node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SEED_ON_START
        value: false
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        value: railway
      - key: DB_PORT
        sync: false
      - key: ADMIN_FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
